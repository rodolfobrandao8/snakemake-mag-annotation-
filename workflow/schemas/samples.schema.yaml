$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
description: entries for the sample sheet
properties:
  sample:
    type: string
    description: MAG name or unique identifier
  path:
    type: string
    description: path to the MAG FASTA file
  domain:
    type: string
    enum: ["prok", "euk"]
    description: domain of the organism (must be strictly 'prok' or 'euk')

required:
  - sample
  - path
  - domain

additionalProperties: True